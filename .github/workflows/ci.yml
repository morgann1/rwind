name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Selene
        run: selene src

      - name: Rojo build
        run: rojo build default.project.json --output rwind.rbxm
