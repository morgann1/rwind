[package]
name = "morgann1/rwind"
version = "0.1.0"
license = "MIT"
authors = ["morgann1"]
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"
homepage = "https://morgann1.github.io/rwind/"
repository = "https://github.com/morgann1/rwind"
exclude = [
    "examples/**",
    "docs/**",
    ".vitepress/**",
    ".lute/**",
    ".vscode/**",
    ".github/**",
    "node_modules/**",
    "package.json",
    "package-lock.json",
    "bun.lock",
    "bun.lockb",
    "DevPackages/**",
    "Packages/**",
    "ServerPackages/**",
    "tmp/**",
    "AGENTS.md",
    "CLAUDE.md",
    "selene.toml",
    "rokit.toml",
    "sourcemap.json",
    "wally.lock",
    "dev.project.json",
    "*.rbxl",
    "*.rbxlx",
    "*.rbxm",
    "*.rbxmx",
]

[dependencies]

[dev-dependencies]
React = "jsdotlua/react@17.2.1"
ReactRoblox = "jsdotlua/react-roblox@17.2.1"
